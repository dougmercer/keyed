name: ruff
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Run Ruff check
        run: uvx ruff check --output-format=github src/ tests/
      - name: Run Ruff format check
        run: uvx ruff format --check src/ tests/
