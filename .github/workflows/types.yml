name: Type Checking

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: ./.github/actions/install-system-deps
      - name: Install dependencies
        run: uv sync --group lint --extra previewer --extra login
      - name: Run Pyright
        run: uv run --group lint --extra previewer --no-sync pyright src/
